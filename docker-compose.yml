version: '3.9'

services:
  # PostgreSQL with pgvector (future semantic search)
  postgres:
    image: pgvector/pgvector:pg16
    container_name: hermeneutica-db
    environment:
      POSTGRES_USER: hermeneutica
      POSTGRES_PASSWORD: hermeneutica_pass
      POSTGRES_DB: hermeneutica
    volumes:
      - pgdata:/var/lib/postgresql/data
    ports:
      - '5432:5432'
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U hermeneutica']
      interval: 10s
      timeout: 5s
      retries: 5

  # NestJS Backend API
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: hermeneutica-api
    environment:
      PORT: 3001
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      OPENAI_MODEL: ${OPENAI_MODEL:-gpt-4o}
      FRONTEND_URL: http://localhost:4200
      DATABASE_URL: postgresql://hermeneutica:hermeneutica_pass@postgres:5432/hermeneutica
    ports:
      - '3001:3001'
    volumes:
      - ./data:/app/data:ro
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped

  # Angular Frontend (Nginx serves on port 80)
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: hermeneutica-ui
    environment:
      NODE_ENV: production
    ports:
      - '4200:80'
    depends_on:
      - backend
    restart: unless-stopped

volumes:
  pgdata:
